name: Daily Discord Message

on:
  schedule:
    # 毎日 日本時間 9:00
    # GitHub ActionsはUTCなので
    # JST 9:00 = UTC 0:00
    - cron: '0 0 * * *'

  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content":"今日もない感じか"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
